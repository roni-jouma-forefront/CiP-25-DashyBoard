services:
  dashyboard-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: dashyboard-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - dashyboard-api
    networks:
      - dashyboard-network

  dashyboard-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dashyboard-api
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Swedavia__FlightInfoApiKey=${SWEDAVIA_FLIGHT_API_KEY}
      - Swedavia__WaitTimeApiKey=${SWEDAVIA_WAIT_TIME_API_KEY}
      - CheckWx__ApiKey=${CHECKWX_API_KEY}
      - GitHub__ClientId=${GITHUB_CLIENT_ID}
      - GitHub__ClientSecret=${GITHUB_CLIENT_SECRET}
      - GitHub__Repository=${GITHUB_REPOSITORY}
    volumes:
      - ./backend/data:/app/data
    networks:
      - dashyboard-network

networks:
  dashyboard-network:
    driver: bridge
