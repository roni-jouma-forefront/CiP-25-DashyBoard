# Render Blueprint - Infrastructure as Code
# Deploy both frontend and backend with one click
# https://render.com/docs/blueprint-spec

services:
  # Backend API Service
  - type: web
    name: dashyboard-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    region: frankfurt # Change to your preferred region (oregon, ohio, singapore, frankfurt)
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        value: Data Source=/app/data/DashyBoard.db
      # Add your API keys as secrets in Render dashboard
      - key: Swedavia__FlightInfoApiKey
        sync: false
      - key: Swedavia__WaitTimeApiKey
        sync: false
      - key: CheckWx__ApiKey
        sync: false
      - key: GitHub__ClientId
        sync: false
      - key: GitHub__ClientSecret
        sync: false
      - key: GitHub__Repository
        sync: false
      - key: Jwt__Secret
        generateValue: true

  # Frontend Static Site
  - type: web
    name: dashyboard-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # This will be set after backend deploys - update with your actual backend URL
      - key: VITE_BASE_URL
        value: https://dashyboard-api.onrender.com
      - key: VITE_HOTEL_ID
        value: your-hotel-id-here
      - key: VITE_GITHUB_CLIENT_ID
        value: your-github-client-id-here
      - key: VITE_GITHUB_CLIENT_SECRET
        value: your-github-client-secret-here  
      - key: VITE_GITHUB_REPOSITORY
        value: your-github-repository-here
